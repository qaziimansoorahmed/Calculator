<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator — Mansoor Ahmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      padding: 2rem;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1.5rem;
    }
    .label span { color: #ff3c3c; }

    .calc {
      width: 340px;
      background: #111;
      border: 1px solid #222;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(255,60,60,0.07);
    }

    /* Display */
    .display {
      background: #0a0a0a;
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid #1a1a1a;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }
    .display-expr {
      font-size: 0.75rem;
      color: #444;
      min-height: 18px;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      word-break: break-all;
      text-align: right;
    }
    .display-main {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #f0f0f0;
      letter-spacing: -0.02em;
      word-break: break-all;
      text-align: right;
      line-height: 1;
      transition: color 0.15s;
    }
    .display-main.error { color: #ff3c3c; font-size: 1.5rem; }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a1a;
    }

    .btn {
      background: #111;
      border: none;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      padding: 1.1rem 0;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, transform 0.08s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { background: #1a1a1a; }
    .btn:active { transform: scale(0.94); background: #222; }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.04);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .btn:hover::after { opacity: 1; }

    .btn.op {
      color: #ff3c3c;
      background: #111;
    }
    .btn.op:hover { background: #1a0a0a; }

    .btn.fn {
      color: #ffcc00;
      background: #111;
      font-size: 0.8rem;
    }
    .btn.fn:hover { background: #1a1a0a; }

    .btn.equals {
      background: #ff3c3c;
      color: #fff;
      font-size: 1.4rem;
    }
    .btn.equals:hover { background: #e02828; }
    .btn.equals:active { background: #c01e1e; }

    .btn.zero { grid-column: span 2; text-align: left; padding-left: 1.5rem; }

    /* Footer */
    .calc-footer {
      padding: 0.75rem 1.5rem;
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calc-footer span {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #333;
      text-transform: uppercase;
    }
    .calc-footer .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ff3c3c;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* Keyboard hint */
    .hint {
      margin-top: 1rem;
      font-size: 0.6rem;
      color: #2a2a2a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <p class="label">Built by <span>Mansoor Ahmed</span></p>

  <div class="calc">
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="main">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn fn" onclick="clearAll()">AC</button>
      <button class="btn fn" onclick="toggleSign()">+/-</button>
      <button class="btn fn" onclick="percent()">%</button>
      <button class="btn op" onclick="setOp('/')">÷</button>
      <!-- Row 2 -->
      <button class="btn" onclick="input('7')">7</button>
      <button class="btn" onclick="input('8')">8</button>
      <button class="btn" onclick="input('9')">9</button>
      <button class="btn op" onclick="setOp('*')">×</button>
      <!-- Row 3 -->
      <button class="btn" onclick="input('4')">4</button>
      <button class="btn" onclick="input('5')">5</button>
      <button class="btn" onclick="input('6')">6</button>
      <button class="btn op" onclick="setOp('-')">−</button>
      <!-- Row 4 -->
      <button class="btn" onclick="input('1')">1</button>
      <button class="btn" onclick="input('2')">2</button>
      <button class="btn" onclick="input('3')">3</button>
      <button class="btn op" onclick="setOp('+')">+</button>
      <!-- Row 5 -->
      <button class="btn zero" onclick="input('0')">0</button>
      <button class="btn" onclick="inputDot()">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
    </div>
    <div class="calc-footer">
      <span>Calculator v1.0</span>
      <div class="dot"></div>
    </div>
  </div>

  <p class="hint">⌨ Keyboard supported</p>

  <script>
    let current = '0';
    let prev = '';
    let operator = null;
    let justCalc = false;

    const mainEl = document.getElementById('main');
    const exprEl = document.getElementById('expr');

    function updateDisplay(val) {
      mainEl.classList.remove('error');
      // Format number nicely
      let num = parseFloat(val);
      if (!isNaN(num) && val.indexOf('.') === -1) {
        mainEl.textContent = num.toLocaleString('en-US');
      } else {
        mainEl.textContent = val;
      }
    }

    function input(digit) {
      if (justCalc) { current = digit; justCalc = false; }
      else if (current === '0') current = digit;
      else if (current.replace('-','').length < 12) current += digit;
      updateDisplay(current);
    }

    function inputDot() {
      if (justCalc) { current = '0.'; justCalc = false; }
      else if (!current.includes('.')) current += '.';
      mainEl.textContent = current;
    }

    function setOp(op) {
      if (operator && !justCalc) calculate(true);
      prev = current;
      operator = op;
      justCalc = true;
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      exprEl.textContent = parseFloat(prev).toLocaleString('en-US') + ' ' + opSymbols[op];
    }

    function calculate(silent) {
      if (!operator || !prev) return;
      let a = parseFloat(prev);
      let b = parseFloat(current);
      let result;
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };

      if (!silent) {
        exprEl.textContent = parseFloat(prev).toLocaleString('en-US') + ' ' + opSymbols[operator] + ' ' + parseFloat(current).toLocaleString('en-US') + ' =';
      }

      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/':
          if (b === 0) {
            mainEl.textContent = 'Cannot ÷ 0';
            mainEl.classList.add('error');
            operator = null; prev = ''; current = '0'; justCalc = true;
            return;
          }
          result = a / b; break;
      }

      // Round to avoid float issues
      result = Math.round(result * 1e10) / 1e10;
      current = String(result);
      operator = null;
      prev = '';
      justCalc = true;
      updateDisplay(current);
    }

    function clearAll() {
      current = '0'; prev = ''; operator = null; justCalc = false;
      exprEl.textContent = '';
      mainEl.classList.remove('error');
      updateDisplay('0');
    }

    function toggleSign() {
      if (current === '0') return;
      current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay(current);
    }

    function percent() {
      current = String(parseFloat(current) / 100);
      updateDisplay(current);
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay(current);
      }
    });
  </script>
</body>
</html>
